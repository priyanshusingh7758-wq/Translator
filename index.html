<!DOCTYPE html>
<html>
<head>
    <title>Translator Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>🌍 Translator</h2>
        <button onclick="showSection('translate')">Translate</button>
        <button onclick="showSection('settings')">Settings</button>
    </div>

    <!-- Main Content -->
    <div class="main">

        <!-- Translate Section -->
        <div id="translate" class="section active">

            <h2>Text Translator</h2>

            <textarea id="inputText" placeholder="Enter text..."></textarea>

            <select id="language">
                <option value="hi">Hindi</option>
                <option value="en">English</option>
                <option value="fr">French</option>
                <option value="de">German</option>
                <option value="es">Spanish</option>
                <option value="zh">Chinese</option>
                <option value="ar">Arabic</option>
                <option value="ru">Russian</option>
                <option value="ja">Japanese</option>
                <option value="it">Italian</option>
                <option value="hi">Bhojpuri (via Hindi)</option>
            </select>

            <button onclick="translateText()">Translate</button>

            <textarea id="outputText" placeholder="Translated text..."></textarea>

        </div>

        <!-- Settings Section -->
        <div id="settings" class="section">

            <h2>API Settings</h2>

            <input type="text" id="apiKey" placeholder="Enter Azure API Key">
            <input type="text" id="region" placeholder="Enter Region">

            <button onclick="saveSettings()">Save</button>

        </div>

    </div>

</div>

<script src="app.js"></script>
</body>
</html>
